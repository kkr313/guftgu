<!-- pages/chat.html -->
  <div id="screen-chat" class="screen">
    <div class="chat-header">
      <div class="chat-header-back" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <div class="chat-header-avatar" id="chatHeaderAvatar">🦊</div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chatHeaderName">NightFox</div>
        <div class="chat-header-status">
          <div class="online-dot"></div>
          Online now
        </div>
      </div>
      <div class="chat-header-actions">
        <div class="chat-action-btn" onclick="startVoiceCall()" title="Voice Call">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        </div>
        <div class="chat-action-btn" title="More">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </div>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="msg-system">🔒 Anonymous chat — no personal info is shared</div>
    </div>

    <div class="chat-input-bar">
      <div class="chat-attach" title="Emoji">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>
      </div>
      <textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1"
        onkeydown="handleChatKey(event)" oninput="autoResize(this)"></textarea>
      <button class="chat-send" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
