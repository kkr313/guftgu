<!-- pages/home.html -->
  <div id="screen-home" class="screen">
    <div class="scroll-body" id="homeScrollBody">

      <!-- Top bar: greeting + avatar shortcut -->
      <div class="home-topbar">
        <div class="home-greeting-wrap">
          <div class="home-greeting" id="homeGreeting">Good evening 👋</div>
          <div class="home-name" id="homeUsername">Hey, Pal</div>
        </div>
        <div class="home-avatar-btn" id="homeAvatarBtn" onclick="showMainScreen('profile')">🦊</div>
      </div>

      <!-- BIG match button -->
      <div class="home-match-section">
        <button class="find-btn" onclick="startMatching()">
          <div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="find-btn-icon">🎙️</span>
              Start a Guftgu
            </div>
            <div class="find-btn-sub" id="findBtnSub">Tap to find someone to talk to</div>
          </div>
        </button>
        <!-- Status row -->
        <div class="home-status-row">
          <div class="online-pill">
            <div class="online-dot"></div>
            <span id="onlineCount">—</span>
          </div>
          <div class="auto-connect-pill" id="autoConnectPill" onclick="toggleAutoConnect()">
            <div class="acp-dot"></div>
            <span id="autoConnectLabel">Auto Connect</span>
          </div>
        </div>
      </div>

      <!-- Mood card -->
      <div class="home-mood-section">
        <div class="mood-display" onclick="showMoodModal()">
          <div class="mood-display-emoji" id="homeMoodEmoji" style="position:relative;">
            <div id="homeMoodAvatar" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:28px;">😊</div>
            <div class="mood-floaters" id="moodFloaters">
              <div class="mood-floater">🦊</div>
              <div class="mood-floater">🐼</div>
              <div class="mood-floater">🦉</div>
              <div class="mood-floater">🐱</div>
              <div class="mood-floater">🦁</div>
              <div class="mood-floater">🐸</div>
            </div>
          </div>
          <div class="mood-display-info">
            <div class="mood-display-label">Matching you as</div>
            <div class="mood-display-name" id="homeMoodName">—</div>
            <div class="mood-intent-tag" id="homeIntentTag"></div>
          </div>
          <div class="mood-display-btn">Change</div>
        </div>
      </div>

      <!-- Firebase connected badge (live) -->
      <div id="homeFirebaseBadge" style="display:none;margin:10px 20px 0;">
        <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(78,205,196,0.08);border:1px solid rgba(78,205,196,0.2);border-radius:50px;padding:5px 12px;font-size:11px;color:var(--accent2);font-weight:600;">
          <div style="width:6px;height:6px;border-radius:50%;background:var(--accent2);"></div>
          Live calls active
        </div>
      </div>

      <!-- Recent chats — real data from localStorage -->
      <div class="home-section" id="recentChatsSection">
        <div class="home-section-header">
          <div class="home-section-title">Recent Chats</div>
          <div class="home-section-action" onclick="showMainScreen('chats')">See all</div>
        </div>
        <div id="recentChats">
          <!-- populated by renderRecentChats() -->
        </div>
      </div>

      <!-- Online now — Firebase live queue OR empty state -->
      <div class="home-section" style="padding-bottom:24px;">
        <div class="home-section-header">
          <div class="home-section-title">Online Now</div>
          <div class="home-section-action" onclick="refreshOnlineNow()">Refresh</div>
        </div>
        <div class="pal-scroll" id="onlineNowList">
          <!-- populated by renderOnlineNow() -->
        </div>
      </div>

      <!-- History + settings shortcut row -->
      <div class="home-history-row" style="padding-bottom:12px;">
        <div class="home-pill-btn" onclick="showScreen('screen-history')">
          📋 <span>Call History</span>
        </div>
        <div class="home-pill-btn" onclick="showMainScreen('profile')">
          ⚙️ <span>Settings</span>
        </div>
      </div>

    </div>
    <!-- Bottom Nav -->
    <div class="bottom-nav" id="homeNav">
      <button class="nav-item active" onclick="showMainScreen('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Home
      </button>
      <button class="nav-item" onclick="showMainScreen('chats')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        Chats
      </button>
      <button class="nav-item" onclick="showMainScreen('notifs')" id="navNotifs">
        <div class="nav-badge" id="notifBadge" style="display:none;">0</div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        Alerts
      </button>
      <button class="nav-item" onclick="showMainScreen('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Profile
      </button>
    </div>
  </div>

  <!-- ═══════════════ MATCH ═══════════════ -->
