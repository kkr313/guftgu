<!-- pages/match.html -->
  <div id="screen-match" class="screen">
    <div class="match-bg"></div>
    <div class="match-content">
      <div class="match-back" onclick="cancelMatch()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>

      <!-- Searching state -->
      <div id="searchState">
        <div class="search-rings" style="margin:0 auto 28px;">
          <div class="ring"></div><div class="ring"></div><div class="ring"></div>
          <div class="search-center" id="searchMoodEmoji">😄</div>
        </div>
        <div class="match-status-pill searching" id="matchStatusPill">
          <div class="loading-dot" style="width:6px;height:6px;margin:0;"></div>
          Searching...
        </div>
        <div class="match-title" id="matchSearchTitle">Finding your match</div>
        <div class="match-sub" id="matchSearchSub">Looking for someone with your mood · <span id="matchFilterLabel">Any region</span></div>
        <div class="loading-dots" style="margin-bottom:24px;">
          <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
        </div>
        <div id="queueCountEl"></div>
        <button class="btn btn-ghost match-cancel-btn" onclick="cancelMatch()">Cancel Search</button>
      </div>
    </div>

    <!-- Match Found Overlay -->
    <div class="match-found" id="matchFoundOverlay">
      <div class="match-found-avatars">
        <div class="mf-avatar" id="myAvatarMF">🐱</div>
        <div class="mf-heart">❤️</div>
        <div class="mf-avatar" id="palAvatarMF">🦊</div>
      </div>
      <div class="mf-title">Match Found! 🎉</div>
      <div class="mf-name" id="palNameMF">NightFox</div>
      <div class="mf-mood" id="palMoodMF">Feeling: Happy 😄</div>
      <div class="mf-badges" id="palBadgesMF"></div>
      <div class="mf-countdown" id="countdownEl">15</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:20px;">Accept before time runs out!</div>
      <div class="mf-actions">
        <button class="mf-decline" onclick="declineMatch()">Skip</button>
        <button class="mf-accept" onclick="acceptMatch()">Connect 🎙️</button>
      </div>
    </div>

    <!-- Post-skip: search again options -->
    <div class="rematch-options" id="rematchOptions">
      <div style="font-size:48px;">👋</div>
      <div class="rematch-title">Match skipped</div>
      <div class="rematch-sub">Want to find another match?</div>
      <button class="btn btn-primary" style="width:100%;max-width:300px;" onclick="restartMatching()">🔍 Search Again</button>
      <button class="btn btn-ghost" style="width:100%;max-width:300px;" onclick="cancelMatch()">Go Home</button>
    </div>
  </div>

  <!-- ═══════════════ CHAT ═══════════════ -->
