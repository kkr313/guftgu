<!-- pages/call.html -->
  <div id="screen-call" class="screen">
    <div class="call-bg"></div>
    <div class="call-content">
      <div class="call-back" onclick="endCall()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <div class="call-status" id="callStatus">CONNECTED</div>
      <div class="call-avatar-ring">
        <div class="call-ring-anim"></div>
        <div class="call-ring-anim"></div>
        <div class="call-avatar-main" id="callAvatar">🦊</div>
      </div>
      <div class="call-name" id="callName">NightFox</div>
      <div class="call-mood" id="callMood">Feeling Chill 😎</div>
      <div class="call-timer" id="callTimer">00:00</div>

      <!-- Call Code (shown when Firebase connected) -->
      <div id="callCodeSection" style="display:none; width:100%; padding:0 24px; margin-bottom:8px;">
        <div class="call-code-box">
          <div class="call-code-label">Your Call Code — share this</div>
          <div class="call-code-value" id="callCodeDisplay">—</div>
          <div class="call-code-sub" id="callCodeHint">Waiting for someone to join...</div>
        </div>
        <div class="call-join-row">
          <input class="call-join-input" id="callJoinInput" placeholder="ENTER CODE OR PHONE NO." maxlength="10" oninput="this.value=this.value.toUpperCase()"/>
          <button class="call-join-btn" onclick="joinCallByCode()">Join</button>
        </div>
      </div>

      <div class="call-controls">
        <div class="call-ctrl" onclick="toggleMute(this)">
          <button class="call-ctrl-btn" id="muteBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
          </button>
          <div class="call-ctrl-label" id="muteLbl">Mute</div>
        </div>
        <div class="call-ctrl">
          <button class="call-end" onclick="endCall()">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
          </button>
          <div class="call-ctrl-label" style="color:var(--accent);">End Call</div>
        </div>
        <div class="call-ctrl" onclick="toggleCallCtrl(this,'Speaker On','Speaker')">
          <button class="call-ctrl-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
          </button>
          <div class="call-ctrl-label">Speaker</div>
        </div>
      </div>
      <!-- Switch to Chat -->
      <button onclick="switchToChat()" style="
        margin-top:20px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
        border-radius:14px; padding:12px 28px; color:var(--text2); font-size:13px;
        font-family:'Sora',sans-serif; font-weight:600; cursor:pointer; letter-spacing:0.04em;
      ">💬 Switch to Chat</button>
    </div>
  </div>
