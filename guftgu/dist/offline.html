<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0A0B10"/>
  <title>Guftgu — Offline</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#0A0B10; color:#e8e8ea;
      font-family:'Sora',system-ui,-apple-system,sans-serif;
      padding:24px; text-align:center;
    }
    .icon {
      width:80px; height:80px; border-radius:20px;
      background:linear-gradient(135deg,#FF6B6B,#FF8E53);
      display:flex; align-items:center; justify-content:center;
      font-size:40px; margin-bottom:24px;
      box-shadow:0 8px 30px rgba(255,107,107,0.25);
    }
    h1 {
      font-family:'Cormorant Garamond',serif;
      font-size:32px; font-weight:600; margin-bottom:8px;
    }
    .tagline {
      font-size:18px; font-weight:600;
      background:linear-gradient(135deg,#FF6B6B,#FF8E53,#4ECDC4);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:24px;
    }
    p {
      color:#999; font-size:14px; line-height:1.6; max-width:300px;
      margin-bottom:32px;
    }
    button {
      background:linear-gradient(135deg,#4ECDC4,#26A69A);
      border:none; border-radius:14px;
      color:white; font-weight:600; font-size:15px;
      padding:14px 36px; cursor:pointer;
      box-shadow:0 4px 20px rgba(78,205,196,0.3);
      transition:transform 0.2s, box-shadow 0.2s;
    }
    button:active { transform:scale(0.96); }
    .hint {
      margin-top:40px; font-size:11px; color:#555;
      letter-spacing:0.5px;
    }
  </style>
</head>
<body>
  <div class="icon">🎙️</div>
  <h1>Guftgu</h1>
  <div class="tagline">बात करो, दिल से</div>
  <p>You're offline right now. Connect to the internet to start anonymous voice conversations.</p>
  <button onclick="location.reload()">Try Again</button>
  <div class="hint">You'll be back to talking in no time ✨</div>
</body>
</html>
