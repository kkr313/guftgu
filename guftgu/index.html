<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Guftgu — Anonymous Voice Chat</title>
    <meta name="description" content="Talk freely. No names. No judgments. Just real conversations." />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme & Status Bar -->
    <meta name="theme-color" content="#0A0B10" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS (Safari) PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Guftgu" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- Windows / MS Tile -->
    <meta name="msapplication-TileColor" content="#0A0B10" />
    <meta name="msapplication-TileImage" content="/icons/icon.svg" />
    <meta name="msapplication-config" content="none" />

    <!-- Favicon (SVG mic icon) -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
