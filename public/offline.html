<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0A0B10"/>
  <title>Guftgu — Offline</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600&family=Cormorant+Garamond:wght@600&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#0A0B10; color:#e8e8ea;
      font-family:'Sora',system-ui,-apple-system,sans-serif;
      padding:24px; text-align:center;
    }
    .icon {
      width:80px; height:80px; border-radius:22px;
      background:linear-gradient(135deg,#FF6B6B 0%,#FF4757 50%,#e84393 100%);
      display:flex; align-items:center; justify-content:center;
      font-size:38px; margin-bottom:24px;
      box-shadow:0 8px 32px rgba(255,71,87,0.3);
      animation:pulse 2.5s ease-in-out infinite;
    }
    h1 {
      font-family:'Cormorant Garamond',serif;
      font-size:30px; font-weight:600; margin-bottom:6px;
    }
    .tagline {
      font-size:16px; font-weight:600;
      background:linear-gradient(135deg,#FF6B6B,#FF8E53,#4ECDC4);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
      margin-bottom:20px;
    }
    p {
      color:#888; font-size:14px; line-height:1.65; max-width:320px;
      margin-bottom:28px;
    }
    button {
      background:linear-gradient(135deg,#4ECDC4,#26A69A);
      border:none; border-radius:14px;
      color:white; font-weight:600; font-size:15px;
      padding:14px 40px; cursor:pointer;
      box-shadow:0 4px 20px rgba(78,205,196,0.3);
      transition:transform 0.2s, box-shadow 0.2s;
      min-width:200px;
    }
    button:active { transform:scale(0.96); }
    .hint {
      margin-top:28px; font-size:12px; color:#555;
      letter-spacing:0.3px;
    }
    @keyframes pulse {
      0%,100% { box-shadow:0 8px 32px rgba(255,71,87,0.3); }
      50%     { box-shadow:0 8px 40px rgba(255,71,87,0.5), 0 0 60px rgba(255,71,87,0.15); }
    }
  </style>
</head>
<body>
  <div class="icon">🎙️</div>
  <h1>Guftgu</h1>
  <div class="tagline">बात करो, दिल से</div>
  <p>Guftgu needs an internet connection for voice calls and messaging. Please check your Wi-Fi or mobile data.</p>
  <button onclick="location.reload()">Try Again</button>
  <div class="hint">We'll reconnect automatically when you're back online ✨</div>
</body>
</html>
