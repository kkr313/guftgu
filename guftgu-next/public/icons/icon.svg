<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0F18"/>
      <stop offset="100%" stop-color="#0A0B10"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FF8E53"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="240" r="130" fill="none" stroke="url(#wave)" stroke-width="2.5" opacity="0.15"/>
  <!-- Mic body -->
  <rect x="220" y="140" width="72" height="140" rx="36" fill="url(#mic)" opacity="0.95"/>
  <!-- Mic arc -->
  <path d="M180 270 C180 320 214 355 256 355 C298 355 332 320 332 270"
    fill="none" stroke="url(#wave)" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
  <!-- Mic stand -->
  <line x1="256" y1="355" x2="256" y2="400"
    stroke="url(#wave)" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <!-- Mic base -->
  <line x1="222" y1="400" x2="290" y2="400"
    stroke="url(#wave)" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <!-- Sound waves left -->
  <path d="M162 210 C145 235 145 275 162 300"
    fill="none" stroke="#4ECDC4" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <path d="M138 190 C112 225 112 285 138 320"
    fill="none" stroke="#4ECDC4" stroke-width="3.5" stroke-linecap="round" opacity="0.18"/>
  <!-- Sound waves right -->
  <path d="M350 210 C367 235 367 275 350 300"
    fill="none" stroke="#4ECDC4" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <path d="M374 190 C400 225 400 285 374 320"
    fill="none" stroke="#4ECDC4" stroke-width="3.5" stroke-linecap="round" opacity="0.18"/>
</svg>
